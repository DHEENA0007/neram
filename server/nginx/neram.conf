server {
    listen 80;
    server_name yourdomain.com; # <--- REPLACE WITH YOUR DOMAIN OR IP

    # Frontend and API
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static uploads directory (Server side)
    location /uploads/ {
        alias /var/www/neram/server/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Security: deny access to .env files
    location ~ /\.env {
        deny all;
    }

    # Increase upload size for branding logos
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/neram_access.log;
    error_log /var/log/nginx/neram_error.log;
}
